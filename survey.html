<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survey</title>
    <link rel="stylesheet" href="style.css">

</head>

<body>
    <h1>Society polls</h1>
    <form>
        <label>cleanliness satisfaction</label>
            <select>
                <option>Excellent</option>
                <option>Good</option>
                <option>Average</option>
                <option>Poor</option>

            </select>
            <label>Security service feedback</label>
            <input type="text">
            <br>
            <label>Parking issue</label>
            <input type="checkbox">Yes
            <input type="checkbox">No
            <br><br>
            <label>Suggestions</label>
            <textarea rows="5"></textarea>
            <br>
            <button>Submit survey</button>
    </form>
    
</body>
</html>
